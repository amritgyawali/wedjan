components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ClientHeader:
      name: X-Wedjan-Client
      in: header
      required: false
      description: >
        Client type. "mobile" makes token endpoints return the refresh token
        in the body (SecureStore) instead of an httpOnly cookie.
      schema:
        type: string
        enum: [web, mobile]
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Caller-generated key for booking creation. Reusing the same key with the
        same request returns the original booking; a different request returns 409.
      schema:
        type: string
        minLength: 1
        maxLength: 100

  responses:
    ValidationError:
      description: Request failed validation.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Forbidden:
      description: Authenticated but not allowed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    RateLimited:
      description: Too many requests.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Conflict:
      description: The requested operation conflicts with current availability or aggregate state.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:
    Role:
      type: string
      enum: [CUSTOMER, VENDOR, FREELANCER, ADMIN]

    AccountStatus:
      type: string
      enum: [PENDING_VERIFICATION, ACTIVE, SUSPENDED, DELETED]

    Currency:
      type: string
      description: ISO 4217 code. Supported at launch.
      enum: [AUD, USD, GBP, NPR]

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, traceId]
          properties:
            code:
              type: string
              description: Stable machine-readable error code (e.g. AUTH_INVALID_CREDENTIALS).
            message:
              type: string
            fieldErrors:
              type: array
              items:
                type: object
                required: [field, message]
                properties:
                  field: { type: string }
                  message: { type: string }
            traceId:
              type: string
              description: Correlation id for support/log lookup.

    MessageResponse:
      type: object
      required: [message]
      properties:
        message: { type: string }

    SignupRequest:
      type: object
      required: [email, password, role]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password:
          type: string
          minLength: 10
          maxLength: 128
          description: Argon2id-hashed at rest; min 10 chars.
        role:
          type: string
          enum: [CUSTOMER, VENDOR, FREELANCER]
        locale: { type: string, default: en, maxLength: 10 }
        defaultCurrency: { $ref: "#/components/schemas/Currency" }
        marketingOptIn: { type: boolean, default: false }

    VerifyEmailRequest:
      type: object
      required: [email, code]
      properties:
        email: { type: string, format: email }
        code: { type: string, pattern: "^[0-9]{6}$" }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
        deviceName: { type: string, maxLength: 120 }

    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          description: Only for mobile clients; web uses the httpOnly cookie.

    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    PasswordResetConfirmRequest:
      type: object
      required: [email, code, newPassword]
      properties:
        email: { type: string, format: email }
        code: { type: string, pattern: "^[0-9]{6}$" }
        newPassword: { type: string, minLength: 10, maxLength: 128 }

    AddRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [CUSTOMER, VENDOR, FREELANCER]

    RolesResponse:
      type: object
      required: [roles]
      properties:
        roles:
          type: array
          items: { $ref: "#/components/schemas/Role" }

    AuthTokensResponse:
      type: object
      required: [accessToken, expiresInSeconds, account]
      properties:
        accessToken: { type: string }
        expiresInSeconds: { type: integer, format: int32 }
        refreshToken:
          type: string
          description: "Present only for mobile clients (X-Wedjan-Client: mobile)."
        account: { $ref: "#/components/schemas/MeResponse" }

    Account:
      type: object
      required: [id, email, status, locale, defaultCurrency, createdAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        phone: { type: string }
        status: { $ref: "#/components/schemas/AccountStatus" }
        locale: { type: string }
        defaultCurrency: { $ref: "#/components/schemas/Currency" }
        marketingOptIn: { type: boolean }
        createdAt: { type: string, format: date-time }

    Profile:
      type: object
      required: [accountId]
      properties:
        accountId: { type: string, format: uuid }
        displayName: { type: string }
        avatarMediaId: { type: string, format: uuid }
        city: { type: string }
        country: { type: string, description: "ISO 3166-1 alpha-2" }
        timezone: { type: string, description: "IANA tz, e.g. Asia/Kathmandu" }

    MeResponse:
      type: object
      required: [account, roles, profile]
      properties:
        account: { $ref: "#/components/schemas/Account" }
        roles:
          type: array
          items: { $ref: "#/components/schemas/Role" }
        profile: { $ref: "#/components/schemas/Profile" }

    UpdateProfileRequest:
      type: object
      properties:
        displayName: { type: string, maxLength: 120 }
        avatarMediaId: { type: string, format: uuid }
        city: { type: string, maxLength: 120 }
        country: { type: string, minLength: 2, maxLength: 2 }
        timezone: { type: string, maxLength: 64 }
        locale: { type: string, maxLength: 10 }
        defaultCurrency: { $ref: "#/components/schemas/Currency" }
        marketingOptIn: { type: boolean }

    Session:
      type: object
      required: [id, createdAt, expiresAt, current]
      properties:
        id: { type: string, format: uuid }
        deviceName: { type: string }
        ip: { type: string }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        current:
          type: boolean
          description: True when this row backs the presented credentials.

    SessionListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Session" }

    MediaKind:
      type: string
      enum: [IMAGE, VIDEO, DOC]

    MediaStatus:
      type: string
      enum: [UPLOADING, READY, BLOCKED]

    MediaPresignRequest:
      type: object
      required: [kind, mime, bytes]
      properties:
        kind: { $ref: "#/components/schemas/MediaKind" }
        mime: { type: string, maxLength: 255 }
        bytes: { type: integer, format: int64, minimum: 1 }

    MediaPresignResponse:
      type: object
      required: [mediaId, uploadUrl, expiresInSeconds]
      properties:
        mediaId: { type: string, format: uuid }
        uploadUrl: { type: string, format: uri }
        expiresInSeconds: { type: integer, format: int32 }
        headers:
          type: object
          additionalProperties: { type: string }
          description: Headers the client must send on the PUT.

    MediaAsset:
      type: object
      required: [id, kind, mime, bytes, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        kind: { $ref: "#/components/schemas/MediaKind" }
        mime: { type: string }
        bytes: { type: integer, format: int64 }
        width: { type: integer, format: int32 }
        height: { type: integer, format: int32 }
        blurhash: { type: string }
        status: { $ref: "#/components/schemas/MediaStatus" }
        url:
          type: string
          format: uri
          description: Public or signed GET URL when READY.
        createdAt: { type: string, format: date-time }

    HealthResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok] }
        version: { type: string }

    # ------------------------------------------------------------------
    # Phase 2 — vendor supply
    # ------------------------------------------------------------------

    Category:
      type: object
      required: [id, slug, name, sort, isActive]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        parentId: { type: string, format: uuid }
        icon: { type: string, description: Material Symbols icon name }
        sort: { type: integer }
        isActive: { type: boolean }

    CategoryListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Category" }

    VendorStatus:
      type: string
      enum: [DRAFT, SUBMITTED, UNDER_REVIEW, VERIFIED, REJECTED, SUSPENDED]

    PricingModel:
      type: string
      enum: [FLAT, PER_HOUR, PER_GUEST, STARTING_AT]

    BookingMode:
      type: string
      enum: [INSTANT, REQUEST]

    CancellationPolicy:
      type: string
      enum: [FLEXIBLE, MODERATE, STRICT]

    PackageStatus:
      type: string
      enum: [DRAFT, PUBLISHED, ARCHIVED]

    VendorMediaKind:
      type: string
      enum: [GALLERY, COVER, LOGO, SHOWREEL]

    VerificationDocumentType:
      type: string
      enum: [BUSINESS_REGISTRATION, GOVERNMENT_ID, INSURANCE, PORTFOLIO_PROOF]

    VerificationDocumentStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]

    BadgeType:
      type: string
      enum: [IDENTITY_VERIFIED, BUSINESS_VERIFIED, INSURED, TOP_RATED, RISING_STAR]

    VendorProfile:
      type: object
      required: [accountId, status, onboardingStep, currency, availabilityMode, timezone]
      properties:
        accountId: { type: string, format: uuid }
        businessName: { type: string }
        slug: { type: string }
        tagline: { type: string }
        about: { type: string }
        foundedYear: { type: integer }
        teamSize: { type: integer }
        languages:
          type: array
          items: { type: string }
        baseCity: { type: string }
        baseCountry: { type: string }
        lat: { type: number }
        lng: { type: number }
        website: { type: string }
        instagram: { type: string }
        status: { $ref: "#/components/schemas/VendorStatus" }
        rejectionReason: { type: string }
        onboardingStep: { type: integer, minimum: 1, maximum: 7 }
        currency: { $ref: "#/components/schemas/Currency" }
        availabilityMode: { $ref: "#/components/schemas/AvailabilityMode" }
        timezone: { type: string, maxLength: 64, description: IANA timezone for venue-local calendar dates and slots. }

    VendorProfileUpdateRequest:
      type: object
      properties:
        businessName: { type: string, maxLength: 160 }
        tagline: { type: string, maxLength: 160 }
        about: { type: string, maxLength: 5000 }
        foundedYear: { type: integer, minimum: 1900, maximum: 2100 }
        teamSize: { type: integer, minimum: 1, maximum: 10000 }
        languages:
          type: array
          maxItems: 10
          items: { type: string, maxLength: 40 }
        baseCity: { type: string, maxLength: 120 }
        baseCountry: { type: string, minLength: 2, maxLength: 2 }
        lat: { type: number, minimum: -90, maximum: 90 }
        lng: { type: number, minimum: -180, maximum: 180 }
        website: { type: string, maxLength: 300 }
        instagram: { type: string, maxLength: 100 }
        currency: { $ref: "#/components/schemas/Currency" }
        onboardingStep: { type: integer, minimum: 1, maximum: 7 }

    VendorCategorySelection:
      type: object
      required: [categoryId, isPrimary]
      properties:
        categoryId: { type: string, format: uuid }
        isPrimary: { type: boolean }

    VendorCategoriesRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 4
          items: { $ref: "#/components/schemas/VendorCategorySelection" }

    ServiceAreaRequest:
      type: object
      required: [mode, city, country]
      properties:
        mode: { type: string, enum: [CITY_RADIUS, REGION] }
        city: { type: string, maxLength: 120 }
        country: { type: string, minLength: 2, maxLength: 2 }
        lat: { type: number }
        lng: { type: number }
        radiusKm: { type: integer, minimum: 1, maximum: 1000 }
        travelFeeCents: { type: integer, format: int64, minimum: 0 }
        travelFeeNote: { type: string, maxLength: 300 }

    ServiceArea:
      allOf:
        - $ref: "#/components/schemas/ServiceAreaRequest"
        - type: object
          required: [id]
          properties:
            id: { type: string, format: uuid }

    PackageRequest:
      type: object
      required: [title, categoryId, priceCents, pricingModel]
      properties:
        title: { type: string, minLength: 3, maxLength: 160 }
        categoryId: { type: string, format: uuid }
        descriptionMd: { type: string, maxLength: 10000 }
        priceCents:
          type: integer
          format: int64
          minimum: 1
          description: "Real price in minor units — zero/absent is impossible by design (Law #1)."
        pricingModel: { $ref: "#/components/schemas/PricingModel" }
        minGuests: { type: integer, minimum: 1 }
        maxGuests: { type: integer, minimum: 1 }
        durationMinutes: { type: integer, minimum: 15 }
        whatsIncludedMd: { type: string, maxLength: 10000 }
        whatsExcludedMd: { type: string, maxLength: 10000 }
        bookingMode: { $ref: "#/components/schemas/BookingMode" }
        depositPct: { type: integer, minimum: 10, maximum: 100 }
        cancellationPolicy: { $ref: "#/components/schemas/CancellationPolicy" }
        allowSameDay: { type: boolean, default: false }
        coverMediaId: { type: string, format: uuid }
        sort: { type: integer }

    Package:
      type: object
      required: [id, vendorId, categoryId, title, slug, priceCents, currency, pricingModel, bookingMode, depositPct, cancellationPolicy, status, allowSameDay, version]
      properties:
        id: { type: string, format: uuid }
        vendorId: { type: string, format: uuid }
        categoryId: { type: string, format: uuid }
        title: { type: string }
        slug: { type: string }
        descriptionMd: { type: string }
        priceCents: { type: integer, format: int64 }
        currency: { $ref: "#/components/schemas/Currency" }
        pricingModel: { $ref: "#/components/schemas/PricingModel" }
        minGuests: { type: integer }
        maxGuests: { type: integer }
        durationMinutes: { type: integer }
        whatsIncludedMd: { type: string }
        whatsExcludedMd: { type: string }
        bookingMode: { $ref: "#/components/schemas/BookingMode" }
        depositPct: { type: integer }
        cancellationPolicy: { $ref: "#/components/schemas/CancellationPolicy" }
        status: { $ref: "#/components/schemas/PackageStatus" }
        allowSameDay: { type: boolean }
        version: { type: integer, format: int64, minimum: 0 }
        coverMediaId: { type: string, format: uuid }
        coverUrl: { type: string }
        sort: { type: integer }

    AddOnRequest:
      type: object
      required: [title, priceCents, pricingModel]
      properties:
        packageId:
          type: string
          format: uuid
          description: Omit for a vendor-wide add-on.
        title: { type: string, minLength: 2, maxLength: 160 }
        priceCents: { type: integer, format: int64, minimum: 1 }
        pricingModel: { $ref: "#/components/schemas/PricingModel" }
        maxQty: { type: integer, minimum: 1, maximum: 999 }
        description: { type: string, maxLength: 1000 }

    AddOn:
      allOf:
        - $ref: "#/components/schemas/AddOnRequest"
        - type: object
          required: [id]
          properties:
            id: { type: string, format: uuid }

    VendorMediaItemRequest:
      type: object
      required: [mediaId, kind]
      properties:
        mediaId: { type: string, format: uuid }
        kind: { $ref: "#/components/schemas/VendorMediaKind" }
        caption: { type: string, maxLength: 300 }
        sort: { type: integer }

    VendorMediaRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          maxItems: 60
          items: { $ref: "#/components/schemas/VendorMediaItemRequest" }

    VendorMediaItem:
      type: object
      required: [id, mediaId, kind, sort]
      properties:
        id: { type: string, format: uuid }
        mediaId: { type: string, format: uuid }
        kind: { $ref: "#/components/schemas/VendorMediaKind" }
        caption: { type: string }
        sort: { type: integer }
        url: { type: string }
        width: { type: integer }
        height: { type: integer }
        blurhash: { type: string }

    VendorFaqItem:
      type: object
      required: [question, answerMd]
      properties:
        question: { type: string, minLength: 5, maxLength: 300 }
        answerMd: { type: string, minLength: 5, maxLength: 3000 }

    VendorFaqsRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          maxItems: 12
          items: { $ref: "#/components/schemas/VendorFaqItem" }

    VerificationDocumentRequest:
      type: object
      required: [type, mediaId]
      properties:
        type: { $ref: "#/components/schemas/VerificationDocumentType" }
        mediaId: { type: string, format: uuid }

    VerificationDocument:
      type: object
      required: [id, type, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        type: { $ref: "#/components/schemas/VerificationDocumentType" }
        status: { $ref: "#/components/schemas/VerificationDocumentStatus" }
        reviewerNote: { type: string }
        reviewedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    VendorBadge:
      type: object
      required: [badge, grantedAt]
      properties:
        badge: { $ref: "#/components/schemas/BadgeType" }
        grantedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }

    SubmitGate:
      type: object
      required: [key, step, passed, message]
      properties:
        key: { type: string, description: Stable gate id, e.g. gallery_min_5 }
        step: { type: integer, minimum: 1, maximum: 7 }
        passed: { type: boolean }
        message: { type: string }

    VendorMeResponse:
      type: object
      required: [profile, categories, serviceAreas, packages, addOns, media, faqs, documents, badges, gates, listingStrength]
      properties:
        profile: { $ref: "#/components/schemas/VendorProfile" }
        categories:
          type: array
          items: { $ref: "#/components/schemas/VendorCategorySelection" }
        serviceAreas:
          type: array
          items: { $ref: "#/components/schemas/ServiceArea" }
        packages:
          type: array
          items: { $ref: "#/components/schemas/Package" }
        addOns:
          type: array
          items: { $ref: "#/components/schemas/AddOn" }
        media:
          type: array
          items: { $ref: "#/components/schemas/VendorMediaItem" }
        faqs:
          type: array
          items: { $ref: "#/components/schemas/VendorFaqItem" }
        documents:
          type: array
          items: { $ref: "#/components/schemas/VerificationDocument" }
        badges:
          type: array
          items: { $ref: "#/components/schemas/VendorBadge" }
        gates:
          type: array
          items: { $ref: "#/components/schemas/SubmitGate" }
        listingStrength:
          type: integer
          minimum: 0
          maximum: 100

    VendorPublicResponse:
      type: object
      required: [slug, businessName, baseCity, baseCountry, currency, categories, packages, media, faqs, badges, serviceAreas]
      properties:
        slug: { type: string }
        businessName: { type: string }
        tagline: { type: string }
        about: { type: string }
        foundedYear: { type: integer }
        teamSize: { type: integer }
        languages:
          type: array
          items: { type: string }
        baseCity: { type: string }
        baseCountry: { type: string }
        website: { type: string }
        instagram: { type: string }
        currency: { $ref: "#/components/schemas/Currency" }
        categories:
          type: array
          items: { $ref: "#/components/schemas/Category" }
        packages:
          type: array
          items: { $ref: "#/components/schemas/Package" }
        addOns:
          type: array
          items: { $ref: "#/components/schemas/AddOn" }
        media:
          type: array
          items: { $ref: "#/components/schemas/VendorMediaItem" }
        faqs:
          type: array
          items: { $ref: "#/components/schemas/VendorFaqItem" }
        badges:
          type: array
          items: { $ref: "#/components/schemas/VendorBadge" }
        serviceAreas:
          type: array
          items: { $ref: "#/components/schemas/ServiceArea" }

    VerificationQueueItem:
      type: object
      required: [document, vendorAccountId, businessName, vendorStatus]
      properties:
        document: { $ref: "#/components/schemas/VerificationDocument" }
        vendorAccountId: { type: string, format: uuid }
        businessName: { type: string }
        vendorStatus: { $ref: "#/components/schemas/VendorStatus" }
        mediaUrl: { type: string }

    VerificationQueueResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/VerificationQueueItem" }
        nextCursor: { type: string }

    VerificationReviewRequest:
      type: object
      properties:
        note: { type: string, maxLength: 1000 }
        expiresAt:
          type: string
          format: date-time
          description: For INSURANCE approvals — badge expiry.

    # ------------------------------------------------------------------
    # Phase 4 — availability, calendar sync and booking engine
    # ------------------------------------------------------------------

    AvailabilityMode:
      type: string
      enum: [DATE, SLOT]

    VenueLocationMode:
      type: string
      description: VENDOR uses the vendor's saved base location with no travel fee; TRAVEL validates the supplied venue against configured service areas.
      enum: [VENDOR, TRAVEL]

    AvailabilityStatus:
      type: string
      enum: [AVAILABLE, LIMITED, BOOKED, BLACKED_OUT]

    AvailabilityExceptionType:
      type: string
      enum: [BLACKOUT, EXTRA_OPEN, CUSTOM_SLOTS]

    CalendarSyncStatus:
      type: string
      enum: [PENDING, HEALTHY, DEGRADED]

    BookingStatus:
      type: string
      enum:
        - DRAFT
        - REQUESTED
        - VENDOR_ACCEPTED
        - PENDING_PAYMENT
        - CONFIRMED
        - IN_PROGRESS
        - COMPLETED
        - CANCELLED_BY_CUSTOMER
        - CANCELLED_BY_VENDOR
        - DECLINED
        - EXPIRED
        - DISPUTED

    BookingActor:
      type: string
      enum: [CUSTOMER, VENDOR, SYSTEM, ADMIN]

    BookingDeclineReason:
      type: string
      enum: [NOT_AVAILABLE, SCOPE_MISMATCH, PRICE_MISMATCH, SCHEDULING_CONFLICT, OTHER]

    BookingAllowedAction:
      type: string
      description: Server-authorized action for the authenticated booking participant.
      enum:
        - CONFIRM_PAYMENT_STUB
        - CANCEL
        - DISPUTE
        - ACCEPT
        - DECLINE
        - COMPLETE
        - PROPOSE_RESCHEDULE
        - RESPOND_RESCHEDULE

    AvailabilitySlot:
      type: object
      required: [start, end]
      properties:
        start: { type: string, format: time, description: Venue-local wall-clock time. }
        end: { type: string, format: time, description: Venue-local wall-clock time. }
        label: { type: string, maxLength: 80 }

    AvailabilityRuleRequest:
      type: object
      required: [weekday, isAvailable, jobsPerDay]
      properties:
        weekday: { type: integer, minimum: 0, maximum: 6, description: Sunday is 0. }
        isAvailable: { type: boolean }
        slots:
          type: array
          maxItems: 48
          items: { $ref: "#/components/schemas/AvailabilitySlot" }
        jobsPerDay: { type: integer, minimum: 1, maximum: 100 }

    AvailabilitySettingsRequest:
      type: object
      required: [mode, timezone, rules]
      properties:
        mode: { $ref: "#/components/schemas/AvailabilityMode" }
        timezone: { type: string, minLength: 1, maxLength: 64, description: IANA timezone. }
        rules:
          type: array
          minItems: 7
          maxItems: 7
          items: { $ref: "#/components/schemas/AvailabilityRuleRequest" }

    AvailabilityRule:
      type: object
      required: [id, weekday, isAvailable, slots, jobsPerDay]
      properties:
        id: { type: string, format: uuid }
        weekday: { type: integer, minimum: 0, maximum: 6 }
        isAvailable: { type: boolean }
        slots: { type: array, items: { $ref: "#/components/schemas/AvailabilitySlot" } }
        jobsPerDay: { type: integer, minimum: 1, maximum: 100 }

    AvailabilityExceptionRequest:
      type: object
      required: [date, type]
      properties:
        date: { type: string, format: date }
        type: { $ref: "#/components/schemas/AvailabilityExceptionType" }
        slots:
          type: array
          maxItems: 48
          items: { $ref: "#/components/schemas/AvailabilitySlot" }
        note: { type: string, maxLength: 500 }

    AvailabilityException:
      type: object
      required: [id, date, type, slots, source]
      properties:
        id: { type: string, format: uuid }
        date: { type: string, format: date }
        type: { $ref: "#/components/schemas/AvailabilityExceptionType" }
        slots: { type: array, items: { $ref: "#/components/schemas/AvailabilitySlot" } }
        note: { type: string }
        source: { type: string, enum: [MANUAL, ICS] }
        externalCalendarId: { type: string, format: uuid }

    AvailabilitySettings:
      type: object
      required: [mode, timezone, rules, exceptions]
      properties:
        mode: { $ref: "#/components/schemas/AvailabilityMode" }
        timezone: { type: string }
        rules: { type: array, items: { $ref: "#/components/schemas/AvailabilityRule" } }
        exceptions: { type: array, items: { $ref: "#/components/schemas/AvailabilityException" } }

    SlotAvailability:
      type: object
      required: [start, end, status]
      properties:
        start: { type: string, format: time }
        end: { type: string, format: time }
        label: { type: string }
        status: { $ref: "#/components/schemas/AvailabilityStatus" }

    AvailabilityDay:
      type: object
      required: [date, status, capacity, occupied, slots]
      properties:
        date: { type: string, format: date }
        status: { $ref: "#/components/schemas/AvailabilityStatus" }
        capacity: { type: integer, minimum: 0 }
        occupied: { type: integer, minimum: 0 }
        slots: { type: array, items: { $ref: "#/components/schemas/SlotAvailability" } }

    AvailabilityResponse:
      type: object
      required: [vendorId, vendorSlug, mode, timezone, from, to, serverNow, days]
      properties:
        vendorId: { type: string, format: uuid }
        vendorSlug: { type: string }
        mode: { $ref: "#/components/schemas/AvailabilityMode" }
        timezone: { type: string, description: IANA timezone used for all returned dates and slots. }
        from: { type: string, format: date }
        to: { type: string, format: date }
        serverNow: { type: string, format: date-time }
        days: { type: array, items: { $ref: "#/components/schemas/AvailabilityDay" } }

    ExternalCalendarRequest:
      type: object
      required: [icsUrl]
      properties:
        icsUrl: { type: string, format: uri, minLength: 1, maxLength: 2048 }

    ExternalCalendar:
      type: object
      required: [id, icsUrl, syncStatus]
      properties:
        id: { type: string, format: uuid }
        icsUrl: { type: string, format: uri }
        lastSyncedAt: { type: string, format: date-time }
        syncStatus: { $ref: "#/components/schemas/CalendarSyncStatus" }
        lastError: { type: string }

    CalendarExport:
      type: object
      required: [url, rotatedAt]
      properties:
        url: { type: string, format: uri }
        rotatedAt: { type: string, format: date-time }

    BookingAddOnRequest:
      type: object
      required: [addOnId, qty]
      properties:
        addOnId: { type: string, format: uuid }
        qty: { type: integer, minimum: 1, maximum: 999 }

    BookingConfigurationRequest:
      type: object
      required: [packageId, eventDate, eventTimezone, venueLocationMode]
      properties:
        packageId: { type: string, format: uuid }
        eventDate: { type: string, format: date }
        startTime: { type: string, format: time }
        endTime: { type: string, format: time }
        eventTimezone: { type: string, minLength: 1, maxLength: 64, description: IANA venue timezone. }
        guests: { type: integer, minimum: 1, maximum: 100000 }
        venueLocationMode: { $ref: "#/components/schemas/VenueLocationMode" }
        venueAddress: { type: string, maxLength: 500 }
        venueCity: { type: string, maxLength: 120, description: Structured venue city used for REGION service-area matching. }
        venueCountry: { type: string, pattern: "^[A-Za-z]{2}$", description: ISO 3166-1 alpha-2 venue country used for REGION service-area matching. }
        venueLat: { type: number, format: double, minimum: -90, maximum: 90 }
        venueLng: { type: number, format: double, minimum: -180, maximum: 180 }
        notes: { type: string, maxLength: 3000 }
        addOns:
          type: array
          maxItems: 50
          items: { $ref: "#/components/schemas/BookingAddOnRequest" }
        expectedPackageVersion:
          type: integer
          format: int64
          minimum: 0
          description: Rejects the quote/create operation if the published package changed.

    PriceBreakdown:
      type: object
      required: [currency, subtotalCents, addOnsCents, travelFeeCents, discountCents, totalCents, depositPct, depositCents, cancellationPolicy]
      properties:
        currency: { $ref: "#/components/schemas/Currency" }
        subtotalCents: { type: integer, format: int64, minimum: 0 }
        addOnsCents: { type: integer, format: int64, minimum: 0 }
        travelFeeCents: { type: integer, format: int64, minimum: 0 }
        discountCents: { type: integer, format: int64, minimum: 0 }
        totalCents: { type: integer, format: int64, minimum: 0 }
        depositPct: { type: integer, minimum: 10, maximum: 100 }
        depositCents: { type: integer, format: int64, minimum: 0 }
        cancellationPolicy: { $ref: "#/components/schemas/CancellationPolicy" }

    BookingAddOn:
      type: object
      required: [addOnId, title, qty, unitPriceCents, totalCents]
      properties:
        addOnId: { type: string, format: uuid }
        title: { type: string }
        qty: { type: integer, minimum: 1 }
        unitPriceCents: { type: integer, format: int64, minimum: 0 }
        totalCents: { type: integer, format: int64, minimum: 0 }

    BookingQuote:
      type: object
      required: [vendorId, vendorSlug, packageTitle, bookingMode, price, addOns, availability, quoteExpiresAt]
      properties:
        vendorId: { type: string, format: uuid }
        vendorSlug: { type: string }
        packageTitle: { type: string }
        bookingMode: { $ref: "#/components/schemas/BookingMode" }
        price: { $ref: "#/components/schemas/PriceBreakdown" }
        addOns: { type: array, items: { $ref: "#/components/schemas/BookingAddOn" } }
        availability: { $ref: "#/components/schemas/AvailabilityStatus" }
        quoteExpiresAt: { type: string, format: date-time }

    BookingEvent:
      type: object
      required: [id, toStatus, actor, metadata, createdAt]
      properties:
        id: { type: string, format: uuid }
        fromStatus: { $ref: "#/components/schemas/BookingStatus" }
        toStatus: { $ref: "#/components/schemas/BookingStatus" }
        actor: { $ref: "#/components/schemas/BookingActor" }
        actorId: { type: string, format: uuid }
        metadata: { type: object, additionalProperties: true }
        createdAt: { type: string, format: date-time }

    Reschedule:
      type: object
      required: [id, eventDate, eventTimezone, customerApproved, vendorApproved, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        eventDate: { type: string, format: date }
        startTime: { type: string, format: time }
        endTime: { type: string, format: time }
        eventTimezone: { type: string }
        customerApproved: { type: boolean }
        vendorApproved: { type: boolean }
        status: { type: string, enum: [PENDING, ACCEPTED, REJECTED] }
        createdAt: { type: string, format: date-time }

    Booking:
      type: object
      required: [id, code, customerId, vendorId, vendorSlug, vendorName, packageId, packageTitle, bookingMode, eventDate, eventTimezone, venueLocationMode, price, addOns, status, vendorPenaltyFlag, version, createdAt, serverNow, allowedActions, events]
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        customerId: { type: string, format: uuid }
        vendorId: { type: string, format: uuid }
        vendorSlug: { type: string }
        vendorName: { type: string }
        packageId: { type: string, format: uuid }
        packageTitle: { type: string }
        bookingMode: { $ref: "#/components/schemas/BookingMode" }
        eventDate: { type: string, format: date }
        startTime: { type: string, format: time }
        endTime: { type: string, format: time }
        eventTimezone: { type: string }
        guests: { type: integer }
        venueLocationMode: { $ref: "#/components/schemas/VenueLocationMode" }
        venueAddress: { type: string }
        venueCity: { type: string }
        venueCountry: { type: string }
        venueLat: { type: number, format: double }
        venueLng: { type: number, format: double }
        notes: { type: string }
        price: { $ref: "#/components/schemas/PriceBreakdown" }
        addOns: { type: array, items: { $ref: "#/components/schemas/BookingAddOn" } }
        status: { $ref: "#/components/schemas/BookingStatus" }
        holdExpiresAt: { type: string, format: date-time }
        slaDueAt: { type: string, format: date-time }
        paymentDueAt: { type: string, format: date-time }
        confirmedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }
        disputeWindowEndsAt: { type: string, format: date-time }
        cancelReason: { type: string }
        vendorPenaltyFlag: { type: boolean }
        version: { type: integer, format: int64, minimum: 0 }
        createdAt: { type: string, format: date-time }
        serverNow: { type: string, format: date-time, description: Use for SLA and payment countdowns without trusting the device clock. }
        allowedActions:
          type: array
          items: { $ref: "#/components/schemas/BookingAllowedAction" }
        events: { type: array, items: { $ref: "#/components/schemas/BookingEvent" } }
        pendingReschedule: { $ref: "#/components/schemas/Reschedule" }

    BookingList:
      type: object
      required: [items, serverNow]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/Booking" } }
        nextCursor: { type: string, description: Opaque continuation cursor; absent on the final page. }
        serverNow: { type: string, format: date-time }

    BookingAcceptRequest:
      type: object
      required: [version]
      properties:
        travelFeeCents: { type: integer, format: int64, minimum: 0 }
        addOns:
          type: array
          maxItems: 50
          description: Optional replacement quantities for add-ons selected in the original request; omit to keep them unchanged.
          items: { $ref: "#/components/schemas/BookingAddOnRequest" }
        version: { type: integer, format: int64, minimum: 0 }

    BookingDeclineRequest:
      type: object
      required: [reason, version]
      properties:
        reason: { $ref: "#/components/schemas/BookingDeclineReason" }
        message: { type: string, maxLength: 1000 }
        version: { type: integer, format: int64, minimum: 0 }

    BookingVersionRequest:
      type: object
      required: [version]
      properties:
        version: { type: integer, format: int64, minimum: 0 }

    BookingCancelRequest:
      type: object
      required: [reason, version]
      properties:
        reason: { type: string, minLength: 1, maxLength: 1000 }
        version: { type: integer, format: int64, minimum: 0 }
        refundCalculationId:
          type: string
          format: uuid
          description: Required for customer cancellation; use the latest non-expired refund preview.

    BookingDisputeRequest:
      type: object
      required: [reason, version]
      properties:
        reason: { type: string, minLength: 1, maxLength: 2000 }
        version: { type: integer, format: int64, minimum: 0 }

    RefundCalculation:
      type: object
      required: [calculationId, bookingId, policy, daysToEvent, refundPercent, refundableCents, nonRefundableCents, vendorPenalty, calculatedAt]
      properties:
        calculationId: { type: string, format: uuid }
        bookingId: { type: string, format: uuid }
        policy: { $ref: "#/components/schemas/CancellationPolicy" }
        daysToEvent: { type: integer }
        refundPercent: { type: integer, minimum: 0, maximum: 100 }
        refundableCents: { type: integer, format: int64, minimum: 0 }
        nonRefundableCents: { type: integer, format: int64, minimum: 0 }
        vendorPenalty: { type: boolean }
        calculatedAt: { type: string, format: date-time }

    RescheduleProposalRequest:
      type: object
      required: [eventDate, eventTimezone, version]
      properties:
        eventDate: { type: string, format: date }
        startTime: { type: string, format: time }
        endTime: { type: string, format: time }
        eventTimezone: { type: string, minLength: 1, maxLength: 64 }
        version: { type: integer, format: int64, minimum: 0 }

    RescheduleDecisionRequest:
      type: object
      required: [accept, version]
      properties:
        accept: { type: boolean }
        version: { type: integer, format: int64, minimum: 0 }

    SearchSort: { type: string, enum: [RELEVANCE, PRICE_ASC, PRICE_DESC, RATING, NEWEST] }
    EventType: { type: string, enum: [WEDDING, CORPORATE, BIRTHDAY, CULTURAL, OTHER] }
    ShowcaseStatus: { type: string, enum: [DRAFT, PUBLISHED, FLAGGED] }
    TagStatus: { type: string, enum: [PENDING, ACCEPTED, DECLINED] }
    EntityType: { type: string, enum: [VENDOR, SHOWCASE, PACKAGE] }

    PackageSummary:
      type: object
      required: [id, title, priceCents, currency, pricingModel, bookingMode, depositPct, cancellationPolicy]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        priceCents: { type: integer, format: int64 }
        currency: { $ref: "#/components/schemas/Currency" }
        pricingModel: { $ref: "#/components/schemas/PricingModel" }
        bookingMode: { $ref: "#/components/schemas/BookingMode" }
        depositPct: { type: integer }
        cancellationPolicy: { $ref: "#/components/schemas/CancellationPolicy" }
        whatsIncludedMd: { type: string }
        coverUrl: { type: string }
    VendorCard:
      type: object
      required: [vendorId, slug, businessName, city, country, currency, categories, cheapestPackage, badges, nextAvailableDates]
      properties:
        vendorId: { type: string, format: uuid }
        slug: { type: string }
        businessName: { type: string }
        tagline: { type: string }
        city: { type: string }
        country: { type: string }
        currency: { $ref: "#/components/schemas/Currency" }
        categories: { type: array, items: { type: string } }
        cheapestPackage: { $ref: "#/components/schemas/PackageSummary" }
        badges: { type: array, items: { type: string } }
        coverUrl: { type: string }
        distanceKm: { type: number, format: double }
        nextAvailableDates: { type: array, description: Empty until Phase 4., items: { type: string, format: date } }
        relevance: { type: number, format: double }
    FacetValue:
      type: object
      required: [value, count]
      properties: { value: { type: string }, count: { type: integer, format: int64 } }
    SearchFacets:
      type: object
      required: [categories, cities, badges, bookingModes]
      properties:
        categories: { type: array, items: { $ref: "#/components/schemas/FacetValue" } }
        cities: { type: array, items: { $ref: "#/components/schemas/FacetValue" } }
        badges: { type: array, items: { $ref: "#/components/schemas/FacetValue" } }
        bookingModes: { type: array, items: { $ref: "#/components/schemas/FacetValue" } }
    RelaxationSuggestion:
      type: object
      required: [type, label, value]
      properties: { type: { type: string }, label: { type: string }, value: { type: string } }
    VendorSearchResponse:
      type: object
      required: [items, facets, suggestions, total]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/VendorCard" } }
        facets: { $ref: "#/components/schemas/SearchFacets" }
        suggestions: { type: array, items: { $ref: "#/components/schemas/RelaxationSuggestion" } }
        nextCursor: { type: string }
        total: { type: integer, format: int64 }

    ShowcaseMediaRequest:
      type: object
      required: [mediaId]
      properties:
        mediaId: { type: string, format: uuid }
        caption: { type: string, maxLength: 300 }
        sort: { type: integer }
    ShowcaseVendorTagRequest:
      type: object
      required: [vendorId, roleLabel]
      properties:
        vendorId: { type: string, format: uuid }
        roleLabel: { type: string, maxLength: 120 }
    ShowcaseRequest:
      type: object
      required: [title, eventType, city, country, coverMediaId, media]
      properties:
        title: { type: string, maxLength: 180 }
        eventType: { $ref: "#/components/schemas/EventType" }
        eventDate: { type: string, format: date }
        city: { type: string, maxLength: 120 }
        country: { type: string, minLength: 2, maxLength: 2 }
        coverMediaId: { type: string, format: uuid }
        descriptionMd: { type: string, maxLength: 10000 }
        styleTags: { type: array, maxItems: 12, items: { type: string } }
        media: { type: array, minItems: 1, maxItems: 40, items: { $ref: "#/components/schemas/ShowcaseMediaRequest" } }
        vendorTags: { type: array, maxItems: 20, items: { $ref: "#/components/schemas/ShowcaseVendorTagRequest" } }
        status: { $ref: "#/components/schemas/ShowcaseStatus" }
    ShowcaseMedia:
      type: object
      required: [id, mediaId, sort, url]
      properties:
        id: { type: string, format: uuid }
        mediaId: { type: string, format: uuid }
        caption: { type: string }
        sort: { type: integer }
        url: { type: string }
        width: { type: integer }
        height: { type: integer }
        blurhash: { type: string }
    ShowcaseVendorTag:
      type: object
      required: [id, vendorId, vendorSlug, businessName, roleLabel, status]
      properties:
        id: { type: string, format: uuid }
        vendorId: { type: string, format: uuid }
        vendorSlug: { type: string }
        businessName: { type: string }
        roleLabel: { type: string }
        status: { $ref: "#/components/schemas/TagStatus" }
    Showcase:
      type: object
      required: [id, ownerVendorId, ownerVendorSlug, ownerBusinessName, title, slug, eventType, city, country, status, styleTags, media, vendorTags, createdAt, favorite]
      properties:
        id: { type: string, format: uuid }
        ownerVendorId: { type: string, format: uuid }
        ownerVendorSlug: { type: string }
        ownerBusinessName: { type: string }
        title: { type: string }
        slug: { type: string }
        eventType: { $ref: "#/components/schemas/EventType" }
        eventDate: { type: string, format: date }
        city: { type: string }
        country: { type: string }
        descriptionMd: { type: string }
        status: { $ref: "#/components/schemas/ShowcaseStatus" }
        styleTags: { type: array, items: { type: string } }
        coverUrl: { type: string }
        media: { type: array, items: { $ref: "#/components/schemas/ShowcaseMedia" } }
        vendorTags: { type: array, items: { $ref: "#/components/schemas/ShowcaseVendorTag" } }
        createdAt: { type: string, format: date-time }
        favorite: { type: boolean }
    ShowcaseFeedResponse:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/Showcase" } }
        nextCursor: { type: string }

    FavoriteRequest:
      type: object
      required: [entityType, entityId]
      properties:
        entityType: { $ref: "#/components/schemas/EntityType" }
        entityId: { type: string, format: uuid }
    Favorite:
      type: object
      required: [entityType, entityId, createdAt]
      properties:
        entityType: { $ref: "#/components/schemas/EntityType" }
        entityId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
    FavoriteListResponse:
      type: object
      required: [items]
      properties: { items: { type: array, items: { $ref: "#/components/schemas/Favorite" } } }
    ShortlistRequest:
      type: object
      required: [name]
      properties: { name: { type: string, maxLength: 120 } }
    ShortlistItemRequest:
      type: object
      required: [vendorId]
      properties:
        vendorId: { type: string, format: uuid }
        packageId: { type: string, format: uuid }
        note: { type: string, maxLength: 500 }
    ShortlistItem:
      type: object
      required: [id, vendorId, vendorSlug, businessName]
      properties:
        id: { type: string, format: uuid }
        vendorId: { type: string, format: uuid }
        vendorSlug: { type: string }
        businessName: { type: string }
        packageId: { type: string, format: uuid }
        packageTitle: { type: string }
        priceCents: { type: integer, format: int64 }
        currency: { $ref: "#/components/schemas/Currency" }
        note: { type: string }
    Shortlist:
      type: object
      required: [id, name, items, createdAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        items: { type: array, items: { $ref: "#/components/schemas/ShortlistItem" } }
        createdAt: { type: string, format: date-time }
    ShortlistListResponse:
      type: object
      required: [items]
      properties: { items: { type: array, items: { $ref: "#/components/schemas/Shortlist" } } }
    CompareResponse:
      type: object
      required: [items, displayCurrency, approximatePrices, fxNotice]
      properties:
        items: { type: array, maxItems: 4, items: { $ref: "#/components/schemas/VendorCard" } }
        displayCurrency: { $ref: "#/components/schemas/Currency" }
        approximatePrices: { type: object, additionalProperties: { type: integer, format: int64 } }
        fxNotice: { type: string }

    SeoFaq:
      type: object
      required: [question, answer]
      properties: { question: { type: string }, answer: { type: string } }
    LandingPage:
      type: object
      required: [country, city, categorySlug, categoryName, vendorCount, currency, vendors, faqs, siblingCities, siblingCategories]
      properties:
        country: { type: string }
        city: { type: string }
        categorySlug: { type: string }
        categoryName: { type: string }
        vendorCount: { type: integer, format: int64 }
        minimumPriceCents: { type: integer, format: int64 }
        maximumPriceCents: { type: integer, format: int64 }
        medianPriceCents: { type: integer, format: int64 }
        currency: { $ref: "#/components/schemas/Currency" }
        vendors: { type: array, items: { $ref: "#/components/schemas/VendorCard" } }
        faqs: { type: array, items: { $ref: "#/components/schemas/SeoFaq" } }
        siblingCities: { type: array, items: { type: string } }
        siblingCategories: { type: array, items: { type: string } }
    LandingRoute:
      type: object
      required: [country, city, category]
      properties: { country: { type: string }, city: { type: string }, category: { type: string } }
    LandingRouteList:
      type: object
      required: [items]
      properties: { items: { type: array, items: { $ref: "#/components/schemas/LandingRoute" } } }

security:
  - bearerAuth: []
