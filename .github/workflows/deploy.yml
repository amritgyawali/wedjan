# Production deploys — main branch only.
# Disabled until infra accounts exist: set the repository variable
# DEPLOY_ENABLED=true and add the secrets below to activate.
#   RAILWAY_TOKEN                — Railway project token (API)
#   VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID — Vercel (web)
name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-api:
    name: Deploy API → Railway
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Railway CLI
        run: npx railway up --service wedjan-api --ci
        working-directory: apps/api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-web:
    name: Deploy web → Vercel
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Vercel CLI
        run: npx vercel deploy --prod --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
