name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web + packages (lint, typecheck, build, homepage guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Homepage freeze guard (ADR-001)
        run: node scripts/check-homepage-frozen.mjs

      - name: OpenAPI codegen up to date
        run: |
          pnpm --filter @wedjan/shared codegen
          git diff --exit-code packages/shared/src/generated

      - name: Lint
        run: pnpm turbo run lint --filter='!@wedjan/api'

      - name: Typecheck
        run: pnpm turbo run typecheck --filter='!@wedjan/api'

      - name: Build web
        run: pnpm turbo run build --filter=@wedjan/web

  api:
    name: API (build + unit + Testcontainers integration tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build & test
        run: ./gradlew build
