spring:
  application:
    name: wedjan-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/wedjan}
    username: ${DATABASE_USER:wedjan}
    password: ${DATABASE_PASSWORD:wedjan}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 16MB

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info

wedjan:
  auth:
    # HS256 signing key — MUST be overridden outside local dev.
    jwt-secret: ${JWT_SECRET:dev-only-secret-change-me-dev-only-secret-change-me}
    access-token-ttl-seconds: 900        # 15 minutes
    refresh-token-ttl-days: 30
    otp-ttl-minutes: 15
    otp-max-attempts: 5
    refresh-cookie-name: wedjan_refresh
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}
  mail:
    from: ${MAIL_FROM:wedjan <no-reply@wedjan.local>}
  media:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    region: ${S3_REGION:auto}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    bucket: ${S3_BUCKET:wedjan-media}
    public-base-url: ${MEDIA_PUBLIC_BASE_URL:http://localhost:9000/wedjan-media}
    presign-ttl-minutes: 15
    max-image-bytes: 15728640    # 15 MB
    max-video-bytes: 209715200   # 200 MB
    max-doc-bytes: 10485760      # 10 MB
  seed:
    enabled: ${SEED_ENABLED:false}
    demo-password: ${SEED_DEMO_PASSWORD:Demo@wedjan1}

logging:
  level:
    root: info
    com.wedjan: debug
